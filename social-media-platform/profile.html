<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body onload="checkAuth(); loadProfile();">

  <nav class="navbar">
    <div class="logo">Linkora</div>

    <div class="nav-links">
      <a href="index.html">🏠 Home</a>
      <a href="profile.html" onclick="clearViewUser()">👤 Profile</a>
      <a href="#" onclick="logout()">🚪 Logout</a>
    </div>
  </nav>

  <main class="main-container">

    <section class="profile-card" aria-labelledby="profile-heading">

      <header class="profile-header">
        <div class="profile-avatar" id="avatar">MO</div>

        <div>
          <h2 id="usernameDisplay"></h2>
          <p id="handle"></p>

          <p id="bioText" class="bio"></p>

          <textarea id="bioInput" style="display:none;"></textarea>
          <button onclick="editBio()" id="editBtn">Edit Bio</button>
          <button onclick="saveBio()" id="saveBtn" style="display:none;">Save</button>

          <div id="followBtnContainer"></div>

          <section class="profile-stats" aria-label="Profile statistics">
            <span id="postCount">0</span> Posts |
            <span id="followerCount">0</span> Followers |
            <span id="followingCount">0</span> Following |
            <span id="likeCount">0</span> Likes
          </section>
        </div>
      </header>

    </section>

    <section aria-labelledby="profile-posts-heading">
      <h3 id="profile-posts-heading">My Posts</h3>
      <section id="posts" aria-label="User posts"></section>
    </section>

  </main>

  <script src="js/app.js"></script>
</body>

</html>
