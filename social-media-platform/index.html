<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<!-- <body onload="localStorage.removeItem('viewUser'); checkAuth(); switchFeed('recent');"> -->
<body onload="checkAuth(); loadPosts();">
  <button onclick="localStorage.clear(); location.reload();">
    Reset App
  </button>

  <nav class="navbar">
    <div class="logo">Linkora</div>

    <div class="nav-links">
      <a href="index.html">🏠 Home</a>
      <a href="profile.html" onclick="clearViewUser()">👤 Profile</a>
      <a href="#" onclick="logout()">🚪 Logout</a>
    </div>
  </nav>

  <main class="main-container">

    <section class="card">
      <h3>Create a Post</h3>
      <textarea id="postContent" placeholder="What's on your mind?"></textarea>
      <button class="btn post-btn" onclick="createPost()">Post</button>
    </section>

    <section aria-labelledby="posts-heading">
      <h3 id="posts-heading">Posts</h3>

      <div class="feed-tabs">
        <button onclick="switchFeed('recent')" id="recentTab">Recent</button>
        <button onclick="switchFeed('following')" id="followingTab">Following</button>

        <div class="search-box">
          <input id="searchInput" placeholder="Search username..." autocomplete="off">
          <button onclick="searchUser()">Search</button>
        </div>
      </div>

      <section id="posts" aria-label="Posts feed"></section>
    </section>

  </main>

  <script src="js/app.js"></script>
</body>

</html>
